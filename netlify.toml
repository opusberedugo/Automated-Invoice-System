[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[dev]
  command = "npm run dev-vite"
  port = 8888
  targetPort = 5173

[functions]
  directory = "netlify/functions"
  node_bundler = "nft"

[[redirects]]
  from = "/api/*"
  to = "https://automated-invoice-server.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
